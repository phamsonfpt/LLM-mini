services:
  redis:
    image: redis:7-alpine
    container_name: llm_mini_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: llm_mini_backend
    command: uvicorn src.api.api:app --host 0.0.0.0 --port 8000 --reload --reload-dir src
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - RAG_REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: llm_mini_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
