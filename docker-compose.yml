services:
  redis:
    image: redis:7-alpine
    container_name: llm_mini_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api:
    build: .
    container_name: llm_mini_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - RAG_REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn src.interfaces.api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  ui:
    build: .
    container_name: llm_mini_ui
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - RAG_API_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run src/interfaces/ui.py
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
